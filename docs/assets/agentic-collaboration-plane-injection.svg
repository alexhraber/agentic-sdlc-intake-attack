<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="820" viewBox="0 0 1120 820" role="img" aria-labelledby="title desc">
  <title id="title">Agentic Collaboration-Plane Injection attack chain</title>
  <desc id="desc">A defensive diagram showing untrusted issue-comment artifacts crossing into autonomous agent execution, with a safe quarantine branch.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 1.5; rx: 8; }
      .risk { fill: #fef2f2; stroke: #991b1b; stroke-width: 1.5; rx: 8; }
      .safe { fill: #ecfdf5; stroke: #047857; stroke-width: 1.5; rx: 8; }
      .label { fill: #111827; font: 16px Arial, sans-serif; }
      .small { fill: #374151; font: 14px Arial, sans-serif; }
      .title { fill: #111827; font: 700 24px Arial, sans-serif; }
      .arrow { stroke: #374151; stroke-width: 1.5; fill: none; marker-end: url(#arrow); }
      .safe-arrow { stroke: #047857; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="820"/>
  <text class="title" x="40" y="44">Agentic Collaboration-Plane Injection</text>
  <text class="small" x="40" y="72">Untrusted collaboration content must not cross directly into autonomous execution.</text>

  <rect class="box" x="70" y="115" width="250" height="62"/>
  <text class="label" x="95" y="140">Agent creates</text>
  <text class="label" x="95" y="160">legitimate issue</text>

  <rect class="box" x="435" y="115" width="250" height="62"/>
  <text class="label" x="460" y="140">Fake GitHub account</text>
  <text class="label" x="460" y="160">comments</text>

  <rect class="box" x="800" y="115" width="250" height="62"/>
  <text class="label" x="825" y="140">Comment appears</text>
  <text class="label" x="825" y="160">issue-relevant</text>

  <rect class="box" x="800" y="245" width="250" height="62"/>
  <text class="label" x="825" y="270">ZIP supplied as</text>
  <text class="label" x="825" y="290">fix or helper</text>

  <rect class="box" x="435" y="245" width="250" height="62"/>
  <text class="label" x="460" y="270">Agent ingests</text>
  <text class="label" x="460" y="290">issue context</text>

  <rect class="box" x="70" y="245" width="250" height="62"/>
  <text class="label" x="95" y="270">Artifact treated</text>
  <text class="label" x="95" y="290">as task-relevant</text>

  <rect class="box" x="70" y="375" width="250" height="62"/>
  <text class="label" x="95" y="400">Archive extracted</text>

  <rect class="box" x="435" y="375" width="250" height="62"/>
  <text class="label" x="460" y="400">Binary, script, or</text>
  <text class="label" x="460" y="420">build instruction found</text>

  <rect class="risk" x="800" y="375" width="250" height="62"/>
  <text class="label" x="825" y="400">Agent executes or</text>
  <text class="label" x="825" y="420">passes into tools</text>

  <rect class="risk" x="800" y="505" width="250" height="62"/>
  <text class="label" x="825" y="530">Credential, process,</text>
  <text class="label" x="825" y="550">or network risk</text>

  <path class="arrow" d="M 320 146 L 435 146"/>
  <path class="arrow" d="M 685 146 L 800 146"/>
  <path class="arrow" d="M 925 177 L 925 245"/>
  <path class="arrow" d="M 800 276 L 685 276"/>
  <path class="arrow" d="M 435 276 L 320 276"/>
  <path class="arrow" d="M 195 307 L 195 375"/>
  <path class="arrow" d="M 320 406 L 435 406"/>
  <path class="arrow" d="M 685 406 L 800 406"/>
  <path class="arrow" d="M 925 437 L 925 505"/>

  <text class="title" x="70" y="630">Safe Path</text>

  <rect class="safe" x="70" y="665" width="250" height="62"/>
  <text class="label" x="95" y="690">Artifact quarantined</text>

  <rect class="safe" x="435" y="665" width="250" height="62"/>
  <text class="label" x="460" y="686">Metadata, hash, listing,</text>
  <text class="label" x="460" y="706">MIME/magic, strings,</text>
  <text class="label" x="460" y="726">and static inspection</text>

  <rect class="safe" x="800" y="665" width="250" height="62"/>
  <text class="label" x="825" y="690">Human approval before</text>
  <text class="label" x="825" y="710">worktree extraction,</text>
  <text class="label" x="825" y="730">build, or execution</text>

  <path class="safe-arrow" d="M 560 307 C 560 555, 195 555, 195 665"/>
  <path class="safe-arrow" d="M 320 696 L 435 696"/>
  <path class="safe-arrow" d="M 685 696 L 800 696"/>
</svg>
